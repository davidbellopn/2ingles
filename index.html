    <title>Frases Inglés</title>
    <style>
    body {
      margin:0;
      background:#0f172a;
      color:#e6eef6;
      font-family:Inter,system-ui;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      padding:20px;
      text-align:center;
    }
    #container {
      max-width:900px;
      width:100%;
    }
    #phrase {
      font-size:2.5rem;
      margin-bottom:10px;
      font-weight:700;
    }
    #timer {
      font-size:2.2rem;
      font-weight:700;
      color:#06b6d4;
      margin-bottom:18px;
    }
    .btns {
      display:flex;
      gap:12px;
      justify-content:center;
      margin-top:20px;
    }
    button {
      background:linear-gradient(90deg,#06b6d4,#7dd3fc);
      border:none;
      padding:10px 16px;
      border-radius:8px;
      color:#002;
      cursor:pointer;
      font-weight:700;
      font-size:16px;
    }
    #translation {
      font-size:1.6rem;
      margin-top:12px;
      color:#7dd3fc;
      font-weight:600;
      min-height:1.8em;
    }
    button[disabled] {
      opacity:0.5;
      cursor:not-allowed;
    }
      .botones-temario {
    display: flex;
    flex-direction: column; /* Los botones uno debajo del otro */
    gap: 20px; /* Espacio entre botones */
    align-items: center; /* Centrar horizontalmente */
    margin: 30px 0;
    font-family: Arial, sans-serif;
}

.boton-policia {
    text-decoration: none;
    background: #0A3D91; /* Azul Policía Nacional */
    color: #ffffff;
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    border-bottom: 3px solid #C9A227; /* Detalle dorado */
    transition: all 0.2s ease;
    width: 220px; /* Ancho uniforme */
    text-align: center;
}

.boton-policia:hover {
    background: #072c6a;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
}
  </style>
  </head>
