// ---- MODO PRO (sin repeticiones hasta terminar) ----
let shuffled = [];
let current = 0;
let currentQuestion = null;

function shuffleArray(array) {
    return array.sort(() => Math.random() - 0.5);
}

function normalize(text) {
    return text.toLowerCase().trim().replace(/\s+/g, ' ');
}

function loadQuestion() {
    currentQuestion = shuffled[current];

    document.getElementById("spanish").innerText = currentQuestion.es;
    document.getElementById("userInput").value = "";
    document.getElementById("result").innerText = "";
    document.getElementById("correctAnswer").innerText = "";
}

function checkAnswer() {
    const user = normalize(document.getElementById("userInput").value);
    const correct = normalize(currentQuestion.en);

    if (user === correct) {
        document.getElementById("result").innerHTML = "✔ CORRECTO";
        document.getElementById("result").className = "correct";
    } else {
        document.getElementById("result").innerHTML = "✘ INCORRECTO";
        document.getElementById("result").className = "incorrect";
        document.getElementById("correctAnswer").innerText = "Respuesta correcta: " + currentQuestion.en;
    }
}

function nextQuestion() {
    if (current === 0) {
        shuffled = shuffleArray([...frases]);
    }

    loadQuestion();

    current++;

    if (current >= shuffled.length) {
        current = 0;
    }
}

// Primera carga
nextQuestion();
